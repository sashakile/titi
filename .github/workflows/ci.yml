name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        # RestoreLockedMode is enabled by Directory.Build.props when CI=true
        # Skip if no projects exist yet
        run: |
          if find src test -maxdepth 3 -name "*.csproj" 2>/dev/null | grep -q .; then
            dotnet restore
          else
            echo "No .csproj files found, skipping restore"
          fi
        env:
          CI: true

      - name: Build
        run: |
          if find src test -maxdepth 3 -name "*.csproj" 2>/dev/null | grep -q .; then
            dotnet build --no-restore --configuration Release
          else
            echo "No .csproj files found, skipping build"
          fi

      - name: Test
        run: |
          if find src test -maxdepth 3 -name "*.csproj" 2>/dev/null | grep -q .; then
            dotnet test --no-build --configuration Release --collect:"XPlat Code Coverage"
          else
            echo "No .csproj files found, skipping test"
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false
